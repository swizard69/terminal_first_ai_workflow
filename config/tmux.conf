# terminal-first AI workflow — minimal tmux config
# install: ln -sf ~/projects/terminal_first_ai_workflow/config/tmux.conf ~/.tmux.conf
# reload:  tmux source-file ~/.tmux.conf

# --- terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",tmux-256color:RGB"
set -g escape-time 0
set -g history-limit 50000
set -g mouse on

# pass AI_* env into new panes / after attach
set -g update-environment "AI_TASK TMUX_SESSION AI_PROJECT AI_AGENT SSH_CONNECTION SSH_CLIENT DISPLAY"

# --- naming: session == AI_TASK (mr-1234, ops-prod-ro, ...)
set -g automatic-rename off
set -g allow-rename off
setw -g automatic-rename off
set -g base-index 1
setw -g pane-base-index 1

# auto-export session name as AI_TASK / TMUX_SESSION
set-hook -g session-created 'run-shell "tmux set-environment -t #{session_name} AI_TASK #{session_name} ; tmux set-environment -t #{session_name} TMUX_SESSION #{session_name}"'

# --- prefix: Ctrl+a (prefix+C+a sends literal Ctrl+a to shell)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- splits (stay in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- copy mode (vi keys)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- iTerm / terminal tab title
set -g set-titles on
set -g set-titles-string '#{session_name}:#{window_index}.#{pane_index} #{pane_current_command}'

# --- status bar
set -g status-interval 5
set -g status-position top
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left-length 60
set -g status-right-length 40

# session_name == AI_TASK; @ai_project / @ai_agent set via: scripts/ai-session
set -g status-left '#[fg=#89b4fa,bold] #{session_name} #[fg=#45475a]│#[default] #[fg=#a6e3a1]#{?@ai_project,#{@ai_project},—} #[fg=#45475a]│#[default] #[fg=#f9e2af]#{?@ai_agent,#{@ai_agent},—}'
set -g status-right '#[fg=#6c7086]#H #[fg=#45475a]│#[default] %H:%M %d-%b'

setw -g window-status-format ' #[fg=#585b70]#I:#W '
setw -g window-status-current-format ' #[fg=#1e1e2e,bg=#cba6f7,bold] #I:#W #[fg=#cdd6f4]#{?pane_current_command,· #{pane_current_command},} #[default]'

set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'
